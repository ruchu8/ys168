name: ys168 Login

on:
  schedule:
    - cron: '0 7 3 * *'
  workflow_dispatch:

# 不再需要 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
jobs:
  ys168-login:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # 原生 Node.js 24
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6  # 原生 Node.js 24
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests

      - name: Run login script
        run: python run.py
        env:
          LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          PUSH: ${{ secrets.PUSH }}
          MAIL: ${{ secrets.MAIL }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Keep repo active
        run: |
          last_commit=$(git log -1 --format=%cd --date=unix)
          current_time=$(date +%s)
          days_since_last_commit=$(( (current_time - last_commit) / 86400 ))
          
          echo "距离上次提交的天数: $days_since_last_commit"
          
          if [ $days_since_last_commit -ge 25 ]; then
            echo "超过25天未提交，创建保活提交..."
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git commit --allow-empty -m "自动保活：防止工作流被禁用（${days_since_last_commit} 天未提交）"
            git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/ruchu8/ys168.git main
          else
            echo "无需保活"
          fi
